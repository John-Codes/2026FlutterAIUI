name: ai_chat_app
description: A simple AI chat interface built with Flutter
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  cupertino_icons: ^1.0.6
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  file_selector: ^1.1.0
  camera: ^0.10.5+2
  flutter_markdown_plus: ^1.0.7
  supabase_flutter: ^2.3.4
  provider: ^6.0.5
  app_links: ^6.1.1
  flutter_dotenv: ^5.1.0
  google_maps_flutter: ^2.5.0
  flutter_polyline_points: ^2.0.0
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env